<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Techno Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #f2f2f2;
    }
    .app {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #111 0%, #050505 60%, #000 100%);
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .panel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      max-width: min(78vw, 360px);
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
    }
    input[type="file"] { display: none; }
    .icon-btn {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.04);
      color: #f2f2f2;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
    }
    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    .track-name {
      font-size: 12px;
      color: #8f8f8f;
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }
    .meters {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: min(250px, calc(100vw - 32px));
    }
    .meter { margin-bottom: 10px; }
    .meter:last-child { margin-bottom: 0; }
    .meter span {
      display: block;
      color: #aaa;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    .bar-bg {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }
    .bar-fill {
      width: 0%;
      height: 100%;
      background: #e8e8e8;
    }
    .player-progress {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      z-index: 10;
      color: #aaa;
      user-select: none;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: #8f8f8f;
      font-variant-numeric: tabular-nums;
    }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .play-inline {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
    }
    .progress-track {
      position: relative;
      width: 100%;
      height: 24px;
      cursor: pointer;
    }
    .progress-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.16);
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
    }
    .progress-dial {
      position: absolute;
      left: 0%;
      top: 50%;
      width: 10px;
      height: 10px;
      background: #f2f2f2;
      border: 1px solid rgba(255,255,255,0.35);
      transform: translate(-50%, -50%) rotate(0deg);
      transform-origin: center center;
      pointer-events: none;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .drop-zone {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.86);
      color: #fff;
      font-size: clamp(20px, 5vw, 50px);
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 3px dashed #777;
      padding: 16px;
    }
    .drop-zone.active { display: flex; }

    @media (max-width: 768px) {
      .panel { top: 10px; right: 10px; max-width: 62vw; }
      .icon-btn { width: 44px; height: 44px; }
      .track-name { max-width: 62vw; font-size: 11px; }
      .meters { top: 10px; left: 10px; width: 150px; }
      .meter span { font-size: 9px; }
      .bar-bg { height: 4px; }
      .player-progress { left: 10px; right: 10px; bottom: 10px; }
      .time-row { font-size: 10px; }
      .progress-dial { width: 8px; height: 8px; }
      .play-inline { width: 34px; height: 34px; flex-basis: 34px; }
      .progress-row { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <canvas id="visualizer"></canvas>

    <div class="panel">
      <div class="controls">
        <label class="icon-btn" for="audioFile" title="Cargar pista" aria-label="Cargar pista">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 20h14v-2H5v2zm7-16-5 5h3v6h4V9h3l-5-5z"/>
          </svg>
        </label>
        <input id="audioFile" type="file" accept="audio/*" />
      </div>
      <div class="track-name" id="trackName">No track loaded</div>
    </div>

    <div class="meters">
      <div class="meter"><span>Bass</span><div class="bar-bg"><div class="bar-fill" id="bassMeter"></div></div></div>
      <div class="meter"><span>Mid</span><div class="bar-bg"><div class="bar-fill" id="midMeter"></div></div></div>
      <div class="meter"><span>Treble</span><div class="bar-bg"><div class="bar-fill" id="trebleMeter"></div></div></div>
    </div>

    <div class="player-progress">
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="durationTime">0:00</span>
      </div>
      <div class="progress-row">
        <button class="icon-btn play-inline" id="playBtn" title="Play / Pause" aria-label="Play / Pause">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>
        </button>
        <div class="progress-track" id="progressTrack">
          <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-dial" id="progressDial"></div>
        </div>
      </div>
    </div>

    <div class="drop-zone" id="dropZone">Suelta la pista aquí</div>
    <audio id="audio"></audio>
  </div>

  <script>
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");
    const audio = document.getElementById("audio");
    const audioFile = document.getElementById("audioFile");
    const playBtn = document.getElementById("playBtn");
    const playIcon = document.getElementById("playIcon");
    const pauseIcon = document.getElementById("pauseIcon");
    const trackName = document.getElementById("trackName");
    const bassMeter = document.getElementById("bassMeter");
    const midMeter = document.getElementById("midMeter");
    const trebleMeter = document.getElementById("trebleMeter");
    const dropZone = document.getElementById("dropZone");
    const currentTimeText = document.getElementById("currentTime");
    const durationTimeText = document.getElementById("durationTime");
    const progressTrack = document.getElementById("progressTrack");
    const progressFill = document.getElementById("progressFill");
    const progressDial = document.getElementById("progressDial");

    let audioContext, analyser, source, frequencyData, timeData;
    let animationId = null;
    let canvasWidth = 0, canvasHeight = 0;

    const MAX_DPR = 1.25;
    const FFT_SIZE = 1024;
    const WAVE_STEP = 4;
    const BAR_COUNT = 72;
    const WAVE_AGGRESSIVE = 1.45;
    const WAVE_WHITE_ALPHA = 0.98;

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
      canvasWidth = window.innerWidth;
      canvasHeight = window.innerHeight;
      canvas.width = Math.floor(canvasWidth * dpr);
      canvas.height = Math.floor(canvasHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function setupAudioContext() {
      if (audioContext) return;
      audioContext = new AudioContext();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = FFT_SIZE;
      analyser.smoothingTimeConstant = 0.86;
      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);
      frequencyData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);
    }

    function setPlayPauseIcon(isPlaying) {
      playIcon.style.display = isPlaying ? "none" : "block";
      pauseIcon.style.display = isPlaying ? "block" : "none";
    }

    async function loadAudioFile(file) {
      if (!file) return;
      const url = URL.createObjectURL(file);
      audio.src = url;
      trackName.textContent = file.name;
      setupAudioContext();
      if (audioContext.state === "suspended") await audioContext.resume();
      await audio.play();
      setPlayPauseIcon(true);
      startVisualizer();
    }

    audioFile.addEventListener("change", (e) => loadAudioFile(e.target.files[0]));

    playBtn.addEventListener("click", async () => {
      setupAudioContext();
      if (!audio.src) {
        trackName.textContent = "Primero carga una canción";
        return;
      }
      if (audioContext.state === "suspended") await audioContext.resume();
      if (audio.paused) {
        await audio.play();
        setPlayPauseIcon(true);
        startVisualizer();
      } else {
        audio.pause();
        setPlayPauseIcon(false);
      }
    });

    audio.addEventListener("play", () => setPlayPauseIcon(true));
    audio.addEventListener("pause", () => setPlayPauseIcon(false));
    audio.addEventListener("ended", () => setPlayPauseIcon(false));

    document.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("active");
    });

    document.addEventListener("dragleave", (e) => {
      if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
        dropZone.classList.remove("active");
      }
    });

    document.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("active");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("audio/")) loadAudioFile(file);
    });

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    function updateProgressBar() {
      const current = audio.currentTime || 0;
      const duration = audio.duration || 0;
      currentTimeText.textContent = formatTime(current);
      durationTimeText.textContent = formatTime(duration);
      const progress = duration > 0 ? current / duration : 0;
      const percentage = Math.min(100, Math.max(0, progress * 100));
      progressFill.style.width = `${percentage}%`;
      progressDial.style.left = `${percentage}%`;
      progressDial.style.transform = `translate(-50%, -50%) rotate(${current * 180}deg)`;
    }

    progressTrack.addEventListener("click", (e) => {
      if (!audio.src || !Number.isFinite(audio.duration)) return;
      const rect = progressTrack.getBoundingClientRect();
      const percentage = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      audio.currentTime = percentage * audio.duration;
      updateProgressBar();
    });

    audio.addEventListener("loadedmetadata", updateProgressBar);
    audio.addEventListener("timeupdate", updateProgressBar);
    audio.addEventListener("durationchange", updateProgressBar);

    function getAverageRange(data, start, end) {
      let sum = 0, count = 0;
      for (let i = start; i < end && i < data.length; i++) {
        sum += data[i];
        count++;
      }
      return count ? (sum / count / 255) : 0;
    }

    function clearCanvas() {
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    }

    function drawSubtleBackground(bass) {
      const radius = 160 + bass * 220;
      const gradient = ctx.createRadialGradient(
        canvasWidth / 2, canvasHeight / 2, 20,
        canvasWidth / 2, canvasHeight / 2, radius
      );
      gradient.addColorStop(0, `rgba(255,255,255,${0.08 + bass * 0.12})`);
      gradient.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    }

    function drawHorizontalWaveform(bass, mid) {
      analyser.getByteTimeDomainData(timeData);

      const centerY = canvasHeight * 0.52;
      const amplitude = (80 + bass * 140) * WAVE_AGGRESSIVE;
      const length = timeData.length;

      // Onda suave (fondo)
      ctx.lineWidth = 1.1;
      ctx.strokeStyle = "rgba(180,180,180,0.32)";
      ctx.beginPath();

      let first = true;
      for (let i = 0; i < length; i += WAVE_STEP * 2) {
        const x = (i / (length - 1)) * canvasWidth;
        const value = (timeData[i] - 128) / 128;
        const y = centerY + 34 + value * amplitude * 0.52;

        if (first) {
          ctx.moveTo(x, y);
          first = false;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      // Onda principal agresiva
      ctx.lineWidth = 2.1;
      ctx.strokeStyle = `rgba(255,255,255,${WAVE_WHITE_ALPHA})`;
      ctx.beginPath();

      first = true;
      for (let i = 0; i < length; i += WAVE_STEP) {
        const x = (i / (length - 1)) * canvasWidth;
        const value = (timeData[i] - 128) / 128;
        const sharp = Math.sign(value) * Math.pow(Math.abs(value), 0.72);
        const spike = Math.sin(i * 0.03 + performance.now() * 0.006) * mid * 38;
        const y = centerY + sharp * amplitude * 1.12 + spike;

        if (first) {
          ctx.moveTo(x, y);
          first = false;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
    }

    function drawFrequencyBars(bass) {
      const barWidth = canvasWidth / BAR_COUNT;
      const maxHeight = canvasHeight * 0.26;
      const bottom = canvasHeight - 74;

      for (let i = 0; i < BAR_COUNT; i++) {
        const index = Math.floor((i / BAR_COUNT) * frequencyData.length * 0.72);
        const value = frequencyData[index] / 255;
        const height = value * maxHeight + bass * 12;
        const x = i * barWidth;
        const y = bottom - height;
        const b = Math.floor(90 + value * 165);

        ctx.fillStyle = `rgb(${b},${b},${b})`;
        ctx.fillRect(x + barWidth * 0.22, y, barWidth * 0.56, height);
      }
    }

    function drawCenterPulse(bass, mid, treble) {
      const cx = canvasWidth / 2;
      const cy = canvasHeight / 2;
      const radius = 36 + bass * 85 + mid * 24;
      const alpha = 0.18 + bass * 0.28 + treble * 0.08;

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.55, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(190,190,190,${alpha * 0.6})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawMinimalGrid(bass) {
      const gap = 64;
      const alpha = 0.035 + bass * 0.04;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1;

      for (let x = 0; x < canvasWidth; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvasHeight);
        ctx.stroke();
      }

      for (let y = 0; y < canvasHeight; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvasWidth, y);
        ctx.stroke();
      }
    }

    function updateMeters(bass, mid, treble) {
      bassMeter.style.width = `${Math.min(100, bass * 140)}%`;
      midMeter.style.width = `${Math.min(100, mid * 135)}%`;
      trebleMeter.style.width = `${Math.min(100, treble * 150)}%`;
    }

    function startVisualizer() {
      if (animationId) return;
      animate();
    }

    function animate() {
      animationId = requestAnimationFrame(animate);

      if (!analyser) {
        clearCanvas();
        updateProgressBar();
        return;
      }

      analyser.getByteFrequencyData(frequencyData);

      const bass = getAverageRange(frequencyData, 0, 14);
      const mid = getAverageRange(frequencyData, 14, 90);
      const treble = getAverageRange(frequencyData, 90, 260);

      clearCanvas();
      drawSubtleBackground(bass);
      drawMinimalGrid(bass);
      drawCenterPulse(bass, mid, treble);
      drawFrequencyBars(bass);
      drawHorizontalWaveform(bass, mid);
      updateMeters(bass, mid, treble);
      updateProgressBar();
    }

    clearCanvas();
    updateProgressBar();
    setPlayPauseIcon(false);
  </script>
</body>
</html>

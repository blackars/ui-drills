<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>VOID ORGANISM</title>
  <style>
    :root{ --font:"Courier New", monospace; }
    *{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--font)}
    #game-wrapper{position:fixed;inset:0}
    canvas{width:100%;height:100%;display:block;background:radial-gradient(circle at center,#111 0%,#000 70%)}

    .overlay{
      position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:14px;background:rgba(0,0,0,.78);text-align:center;z-index:20
    }
    .hidden{display:none!important}
    .title{font-size:clamp(28px,8vw,64px);letter-spacing:5px}
    .title span{display:block;color:#777}
    .sub{font-size:12px;letter-spacing:1px;color:#aaa}
    .btn{border:none;background:#fff;color:#000;padding:12px 30px;letter-spacing:2px;cursor:pointer;font-family:var(--font)}

    #hud{
      position:absolute;inset:0;pointer-events:none;padding:12px 14px;
      display:flex;flex-direction:column;justify-content:space-between;z-index:10
    }

    .top{position:relative;min-height:50px}
    .bottom{display:flex;justify-content:space-between;font-size:12px;color:#ccc}
    .label{font-size:9px;letter-spacing:1px;color:#888;margin-bottom:4px;display:block}
    .bar{width:min(44vw,220px);height:10px;border:1px solid #999;background:#111}
    .fill{height:100%;width:100%;background:#fff}

    /* Energy centered */
    #energyWrap{
      position:absolute;left:50%;transform:translateX(-50%);top:0;text-align:center;
      width:min(52vw,280px)
    }
    #energyWrap .bar{width:100%}

    #lives{display:flex;gap:6px;justify-content:flex-end;position:relative;z-index:2}
    .life{width:10px;height:10px;border-radius:50%;background:#fff}
    .lost{background:#333}

    /* Pause button at top-right */
    #pauseBtn{
      position:absolute;top:12px;left:12px;right:auto;z-index:15;pointer-events:auto;
      border:1px solid #aaa;background:rgba(0,0,0,.55);color:#fff;
      width:44px;height:44px;border-radius:none;font-size:18px;cursor:pointer;
      font-family:var(--font)
    }

    #game-wrapper.flash::after{
      content:"";position:absolute;inset:0;background:#fff;opacity:.45;pointer-events:none;
      animation:f .2s forwards;z-index:12
    }
    @keyframes f{to{opacity:0}}

    .inverted{ filter: invert(1) hue-rotate(180deg); }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game"></canvas>

    <button id="pauseBtn" class="hidden" title="Pause">II</button>

    <div id="hud" class="hidden">
      <div class="top">
        <div id="energyWrap">
          <span class="label">ENERGY</span>
          <div class="bar"><div id="energy" class="fill"></div></div>
        </div>

        <div style="text-align:right; margin-left:auto;">
          <span class="label">LIVES</span>
          <div id="lives"></div>
        </div>
      </div>

      <div class="bottom">
        <span id="distance">0 m</span>
        <span id="phase">PHASE 1</span>
        <span id="mult">x1.0</span>
      </div>
    </div>

    <div id="menu" class="overlay">
      <h1 class="title">VOID <span>ORGANISM</span></h1>
      <p class="sub">Mutant particle inside an endless cyber-organic tunnel</p>
      <button id="startBtn" class="btn">START</button>
      <p class="sub">WASD / Arrows / Drag to move · Hold SPACE for burst fire</p>
    </div>

    <div id="pauseOverlay" class="overlay hidden">
      <h2 class="title" style="font-size:clamp(22px,6vw,40px)">PAUSED</h2>
      <button id="resumeBtn" class="btn">RESUME</button>
      <button id="quitBtn" class="btn" style="background:#222;color:#fff;border:1px solid #777">QUIT</button>
    </div>

    <div id="over" class="overlay hidden">
      <h2 class="title" style="font-size:clamp(20px,6vw,38px)">ORGANISM COLLAPSED</h2>
      <p id="res1" class="sub"></p>
      <p id="res2" class="sub"></p>
      <button id="restartBtn" class="btn">RETRY</button>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    // ---------- Utils ----------
    const U = {
      r:(a,b)=>Math.random()*(b-a)+a,
      ri:(a,b)=>Math.floor(Math.random()*(b-a+1))+a,
      c:(v,a,b)=>Math.max(a,Math.min(b,v)),
      d:(x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1),
      a:(x1,y1,x2,y2)=>Math.atan2(y2-y1,x2-x1),
      tri:(cx,cy,s,ang)=>[
        {x:cx+Math.cos(ang)*s,y:cy+Math.sin(ang)*s},
        {x:cx+Math.cos(ang+2.4)*s*.85,y:cy+Math.sin(ang+2.4)*s*.85},
        {x:cx+Math.cos(ang-2.4)*s*.85,y:cy+Math.sin(ang-2.4)*s*.85},
      ],
      circRect(cx,cy,r,rx,ry,rw,rh){
        const nx=U.c(cx,rx-rw/2,rx+rw/2), ny=U.c(cy,ry-rh/2,ry+rh/2);
        return U.d(cx,cy,nx,ny)<=r;
      },
      circPoly(cx,cy,r,pts){
        let inside=false;
        for(let i=0,j=pts.length-1;i<pts.length;j=i++){
          const xi=pts[i].x, yi=pts[i].y, xj=pts[j].x, yj=pts[j].y;
          if(((yi>cy)!==(yj>cy))&&(cx<(xj-xi)*(cy-yi)/(yj-yi)+xi)) inside=!inside;
        }
        if(inside) return true;
        for(let i=0,j=pts.length-1;i<pts.length;j=i++){
          const p1=pts[j], p2=pts[i], dx=p2.x-p1.x, dy=p2.y-p1.y, len=dx*dx+dy*dy;
          let t=len?((cx-p1.x)*dx+(cy-p1.y)*dy)/len:0; t=U.c(t,0,1);
          const px=p1.x+t*dx, py=p1.y+t*dy;
          if(U.d(cx,cy,px,py)<=r) return true;
        }
        return false;
      }
    };

    // ---------- Audio ----------
    const SFX = {
      ctx:null,g:null,
      init(){
        if(this.ctx) return;
        const AC=window.AudioContext||window.webkitAudioContext;
        if(!AC) return;
        this.ctx=new AC();
        this.g=this.ctx.createGain();
        this.g.gain.value=.4;
        this.g.connect(this.ctx.destination);
      },
      resume(){ if(this.ctx&&this.ctx.state==="suspended") this.ctx.resume(); },
      tone(f,d,t="sine",v=.2,f2=null){
        if(!this.ctx) return;
        const n=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
        o.type=t;
        o.frequency.setValueAtTime(f,n);
        if(f2)o.frequency.exponentialRampToValueAtTime(f2,n+d);
        g.gain.setValueAtTime(v,n);
        g.gain.exponentialRampToValueAtTime(.0001,n+d);
        o.connect(g).connect(this.g);
        o.start(n); o.stop(n+d);
      },
      noise(d=.2,v=.2,cut=1200){
        if(!this.ctx) return;
        const len=(this.ctx.sampleRate*d)|0;
        const b=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
        const ch=b.getChannelData(0);
        for(let i=0;i<len;i++) ch[i]=(Math.random()*2-1)*(1-i/len);
        const s=this.ctx.createBufferSource(),f=this.ctx.createBiquadFilter(),g=this.ctx.createGain();
        s.buffer=b; f.type="lowpass"; f.frequency.value=cut; g.gain.value=v;
        s.connect(f).connect(g).connect(this.g); s.start();
      },
      ui(){this.tone(700,.06,"sine",.18,900)},
      hit(){this.noise(.22,.28,1400);this.tone(160,.16,"sawtooth",.2,60)},
      shot(){this.tone(430,.07,"triangle",.12,620)},
      enemyShot(){this.tone(430,.09,"square",.14,220)},
      boom(){this.noise(.28,.30,900);this.tone(210,.15,"sawtooth",.18,90)},
      heal(){this.tone(520,.12,"sine",.2,880)},
      invert(){this.tone(180,.3,"sawtooth",.22,880)},
      death(){this.noise(.6,.35,700);this.tone(120,.5,"sawtooth",.25,35)},
      near(){this.tone(900,.08,"triangle",.12,1300)}
    };

    // ---------- DOM ----------
    const wrap=document.getElementById("game-wrapper");
    const cvs=document.getElementById("game"), ctx=cvs.getContext("2d");
    const menu=document.getElementById("menu"), over=document.getElementById("over"), hud=document.getElementById("hud");
    const pauseOverlay=document.getElementById("pauseOverlay");
    const startBtn=document.getElementById("startBtn"), restartBtn=document.getElementById("restartBtn");
    const pauseBtn=document.getElementById("pauseBtn"), resumeBtn=document.getElementById("resumeBtn"), quitBtn=document.getElementById("quitBtn");
    const energyEl=document.getElementById("energy"), livesEl=document.getElementById("lives");
    const distEl=document.getElementById("distance"), phaseEl=document.getElementById("phase"), multEl=document.getElementById("mult");
    const res1=document.getElementById("res1"), res2=document.getElementById("res2");

    // ---------- State ----------
    let W=innerWidth,H=innerHeight,vertical=H>=W;
    let state="menu", t=0, diff=1, distance=0, best=+localStorage.getItem("vo_best")||0, mult=1;
    let keys={}, touch={on:false,x:0,y:0}, lastTap=0, fireHeld=false, fireCD=0;

    const CFG={maxLives:5,maxEnergy:100,pR:14,tunnelSpeed:2.2,fireRateFrames:7};
    const player={x:W/2,y:H*.7,vx:0,vy:0,r:CFG.pR,energy:CFG.maxEnergy,lives:3,inv:0,pulse:0,trail:[],dead:false,nd:0};
    const bg=[], sparks=[], enemies=[], shots=[], pShots=[], orbs=[];
    let nextOrbDistance=2000;

    // inversion event every 3000m
    let nextInvertDistance=3000;
    let invertEventActive=false;
    let invertProgress=0;
    let invertCx=0, invertCy=0;

    // tunnel
    let patt=0,pattTarget=0,pattTimer=0,squeeze=0,scroll=0,centerSmooth=0.5,halfSmooth=0.28,borderGrace=0;

    // ---------- Init ----------
    function resize(){ W=cvs.width=innerWidth; H=cvs.height=innerHeight; vertical=H>=W; }
    addEventListener("resize",resize); resize();

    function resetBG(){
      bg.length=0;
      for(let i=0;i<90;i++) bg.push({x:U.r(0,W),y:U.r(0,H),d:U.r(.15,1),s:U.r(.6,2.4),g:U.r(.2,.95)});
    }
    resetBG();

    function updateLives(){
      livesEl.innerHTML="";
      for(let i=0;i<CFG.maxLives;i++){
        const d=document.createElement("div");
        d.className="life"+(i>=player.lives?" lost":"");
        livesEl.appendChild(d);
      }
    }

    function updateHUD(){
      energyEl.style.width=(player.energy/CFG.maxEnergy*100)+"%";
      distEl.textContent=(distance|0)+" m";
      phaseEl.textContent="PHASE "+Math.min(5,1+Math.floor(diff));
      multEl.textContent="x"+mult.toFixed(1);
    }

    function flash(){
      wrap.classList.remove("flash");
      void wrap.offsetWidth;
      wrap.classList.add("flash");
    }

    function togglePause(force){
      if(state==="menu"||state==="over") return;
      const toPause = force!==undefined ? force : state==="play";
      if(toPause){
        state="pause";
        pauseOverlay.classList.remove("hidden");
      }else{
        state="play";
        pauseOverlay.classList.add("hidden");
      }
    }

    // ---------- Tunnel ----------
    function corridor(s){
      const minW=0.42, maxW=Math.max(minW+0.02,0.72-squeeze), base=t*22+s*0.006;
      let cT=0.5,hT=0.26;
      if(patt===0){
        cT=0.5+Math.sin(base*0.9)*0.08;
        hT=((maxW-minW)*((Math.sin(base*0.45)+1)/2)+minW)/2;
      } else if(patt===1){
        cT=0.5+Math.sin(base*0.35)*0.04;
        hT=((maxW-minW)*((Math.sin(base*0.7)+1)/2)+minW)/2;
      } else if(patt===2){
        cT=0.5+Math.sin(base*1.3)*0.10;
        hT=((maxW*0.92-minW)*((Math.sin(base*0.5)+1)/2)+minW)/2;
      } else {
        cT=0.5+Math.sin(base*0.8)*0.06;
        hT=((maxW*0.9-minW)*((Math.sin(base*0.55)+1)/2)+minW)/2;
      }
      centerSmooth+=(cT-centerSmooth)*0.06;
      halfSmooth+=(hT-halfSmooth)*0.05;
      return {c:U.c(centerSmooth,0.30,0.70),h:U.c(halfSmooth,minW/2,maxW/2)};
    }

    function tunnelCollide(){
      const along=vertical?player.y:player.x, cross=vertical?W:H, v=vertical?player.x:player.y;
      const cc=corridor(along+scroll), L=cc.c*cross-cc.h*cross, R=cc.c*cross+cc.h*cross;
      return (v-player.r<L || v+player.r>R);
    }

    function drawTunnel(){
      const step=40, along=vertical?H:W, cross=vertical?W:H;
      ctx.fillStyle="#000";
      if(vertical){
        ctx.beginPath(); ctx.moveTo(0,0);
        for(let y=0;y<=along+step;y+=step){ const cc=corridor(y+scroll); ctx.lineTo((cc.c-cc.h)*cross,y); }
        ctx.lineTo(0,along); ctx.closePath(); ctx.fill();

        ctx.beginPath(); ctx.moveTo(cross,0);
        for(let y=0;y<=along+step;y+=step){ const cc=corridor(y+scroll); ctx.lineTo((cc.c+cc.h)*cross,y); }
        ctx.lineTo(cross,along); ctx.closePath(); ctx.fill();
      } else {
        ctx.beginPath(); ctx.moveTo(0,0);
        for(let x=0;x<=along+step;x+=step){ const cc=corridor(x+scroll); ctx.lineTo(x,(cc.c-cc.h)*cross); }
        ctx.lineTo(along,0); ctx.closePath(); ctx.fill();

        ctx.beginPath(); ctx.moveTo(0,cross);
        for(let x=0;x<=along+step;x+=step){ const cc=corridor(x+scroll); ctx.lineTo(x,(cc.c+cc.h)*cross); }
        ctx.lineTo(along,cross); ctx.closePath(); ctx.fill();
      }

      ctx.strokeStyle="rgba(220,220,220,.45)";
      ctx.lineWidth=1.3;
      for(const side of [-1,1]){
        ctx.beginPath();
        for(let p=0;p<=along+step;p+=step){
          const cc=corridor(p+scroll), edge=(cc.c+side*cc.h)*cross;
          if(vertical){ if(p===0)ctx.moveTo(edge,p); else ctx.lineTo(edge,p); }
          else { if(p===0)ctx.moveTo(p,edge); else ctx.lineTo(p,edge); }
        }
        ctx.stroke();
      }
    }

    // ---------- Effects ----------
    function sparkBurst(x,y,n,spd=4,life=28,tone=.9){
      for(let i=0;i<n;i++){
        const a=U.r(0,Math.PI*2), s=U.r(.4,1)*spd;
        sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,t:tone,r:U.r(1,3)});
      }
    }

    function drawBG(speed){
      for(const p of bg){
        p.y+=speed*p.d*(vertical?1:0);
        p.x+=speed*p.d*(vertical?0:1);
        if(p.y>H+10){p.y=-10;p.x=U.r(0,W)}
        if(p.x>W+10){p.x=-10;p.y=U.r(0,H)}
        ctx.strokeStyle=`rgba(${(p.g*255)|0},${(p.g*255)|0},${(p.g*255)|0},${.5*p.d})`;
        ctx.lineWidth=p.s;
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p.x,p.y-Math.min(speed*p.d*1.4,14));
        ctx.stroke();
      }
    }

    // ---------- Entities ----------
    function spawnCube(){
      const s=U.r(20,38);
      enemies.push({
        type:"cube",x:vertical?U.r(s,W-s):-s,y:vertical?-s:U.r(s,H-s),
        s,ang:0,rot:U.r(-.05,.05),
        vx:vertical?U.r(-.35,.35):U.r(1.4,2.8),
        vy:vertical?U.r(1.4,2.8):U.r(-.35,.35)
      });
    }

    function spawnTri(shooter=false){
      const s=U.r(16,24);
      enemies.push({
        type:shooter?"shooter":"tri",
        x:vertical?U.r(s,W-s):-s,y:vertical?-s:U.r(s,H-s),
        s,ang:Math.PI/2,de:0,cd:U.ri(70,130),ch:0,sp:U.r(1.4,2.3)
      });
    }

    function spawnOrb(){
      const y=vertical?-30:U.r(50,H-50), x=vertical?U.r(40,W-40):-30;
      orbs.push({x,y,r:12,vx:vertical?0:2.2,vy:vertical?2.2:0,life:900,pulse:0});
    }

    function startInvertEvent(){
      invertEventActive=true;
      invertProgress=0;
      invertCx=W*0.5;
      invertCy=H*0.5;
      SFX.invert();
    }

    // ---------- Player ----------
    function playerInput(){
      let ix=0,iy=0;
      if(keys["arrowleft"]||keys["a"])ix--;
      if(keys["arrowright"]||keys["d"])ix++;
      if(keys["arrowup"]||keys["w"])iy--;
      if(keys["arrowdown"]||keys["s"])iy++;
      if(touch.on){
        const dx=touch.x-player.x, dy=touch.y-player.y, d=Math.hypot(dx,dy);
        if(d>5){ ix=U.c(dx/40,-1,1); iy=U.c(dy/40,-1,1); }
      }
      player.vx+=ix*.55; player.vy+=iy*.55;
    }

    function playerUpdate(){
      const ms=9, fr=.88, sp=Math.hypot(player.vx,player.vy);
      if(sp>ms){const k=ms/sp;player.vx*=k;player.vy*=k;}
      player.vx*=fr; player.vy*=fr;
      player.x+=player.vx; player.y+=player.vy;
      player.x=U.c(player.x,player.r,W-player.r);
      player.y=U.c(player.y,player.r,H-player.r);
      if(player.inv>0)player.inv--;
      player.pulse+=.12;
      player.trail.push({x:player.x,y:player.y});
      if(player.trail.length>14)player.trail.shift();
      player.nd++;
      if(player.nd>120) player.energy=U.c(player.energy+.04,0,100);
    }

    function playerHit(dmg){
      if(player.inv>0) return;
      player.energy-=dmg;
      player.inv=28;
      player.nd=0;
      SFX.hit();
      flash();
      sparkBurst(player.x,player.y,12,4.5,26,.2);
      if(player.energy<=0){
        player.lives--;
        updateLives();
        player.energy=100;
        sparkBurst(player.x,player.y,34,6.5,40,.9);
        if(player.lives<=0){ player.dead=true; SFX.death(); }
      }
    }

    function firePlayerShot(){
      if(state!=="play"||fireCD>0) return;
      fireCD=CFG.fireRateFrames;
      let dx=0,dy=0;
      if(touch.on){ dx=touch.x-player.x; dy=touch.y-player.y; }
      else{
        if(keys["arrowleft"]||keys["a"])dx-=1;
        if(keys["arrowright"]||keys["d"])dx+=1;
        if(keys["arrowup"]||keys["w"])dy-=1;
        if(keys["arrowdown"]||keys["s"])dy+=1;
      }
      if(Math.hypot(dx,dy)<0.01){ dx=vertical?0:1; dy=vertical?-1:0; }
      const n=Math.hypot(dx,dy)||1; dx/=n; dy/=n;
      pShots.push({x:player.x,y:player.y,vx:dx*9.2,vy:dy*9.2,r:5,life:85});
      SFX.shot();
    }

    // ---------- Flow ----------
    function resetGame(){
      t=0; diff=1; distance=0; mult=1; fireCD=0; fireHeld=false;
      patt=0; pattTarget=0; pattTimer=0; squeeze=0; scroll=0; centerSmooth=0.5; halfSmooth=0.28; borderGrace=40;
      nextOrbDistance=2000; nextInvertDistance=3000;
      invertEventActive=false; invertProgress=0;
      wrap.classList.remove("inverted");

      player.x=W/2; player.y=vertical?H*.72:H*.5;
      const cross=vertical?W:H, along=vertical?player.y:player.x, cc=corridor(along+scroll);
      if(vertical) player.x=cc.c*cross; else player.y=cc.c*cross;

      player.vx=0; player.vy=0; player.energy=100; player.lives=3;
      player.inv=0; player.pulse=0; player.trail=[]; player.dead=false; player.nd=0;

      enemies.length=0; shots.length=0; sparks.length=0; pShots.length=0; orbs.length=0;

      updateLives();
      updateHUD();
    }

    function startGame(){
      SFX.init(); SFX.resume(); SFX.ui();
      resetGame();
      menu.classList.add("hidden");
      over.classList.add("hidden");
      pauseOverlay.classList.add("hidden");
      hud.classList.remove("hidden");
      pauseBtn.classList.remove("hidden");
      state="play";
    }

    function quitToMenu(){
      state="menu";
      pauseOverlay.classList.add("hidden");
      hud.classList.add("hidden");
      pauseBtn.classList.add("hidden");
      over.classList.add("hidden");
      menu.classList.remove("hidden");
      wrap.classList.remove("inverted");
      invertEventActive=false;
    }

    // ---------- Update ----------
    function update(){
      if(state!=="play") return;

      t++;
      diff=Math.min(1+t*0.0023,4.5);
      const speed=2.2*(1+diff*.34);
      distance+=speed*.1;
      scroll+=speed;

      if(fireCD>0) fireCD--;
      if(fireHeld) firePlayerShot();

      pattTimer++;
      if(pattTimer>260){ pattTimer=0; pattTarget=U.ri(0,3); }
      if(patt!==pattTarget && t%45===0){ patt=pattTarget; borderGrace=24; }
      squeeze=Math.min(diff*0.015,0.08);
      if(borderGrace>0) borderGrace--;

      playerInput();
      playerUpdate();

      if(Math.random()<0.010*diff) spawnCube();
      if(Math.random()<0.0035*diff) spawnTri(false);
      if(Math.random()<0.0020*diff) spawnTri(true);

      if(distance>=nextOrbDistance){ spawnOrb(); nextOrbDistance+=2000; }

      if(distance>=nextInvertDistance){
        nextInvertDistance+=3000;
        startInvertEvent();
      }

      if(invertEventActive){
        invertProgress += 0.02;
        if(invertProgress>=1){
          invertProgress=1;
          invertEventActive=false;
          wrap.classList.toggle("inverted");
        }
      }

      // enemies
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        if(e.type==="cube"){
          e.x+=e.vx; e.y+=e.vy; e.ang+=e.rot+.02;
        } else {
          const ang=U.a(e.x,e.y,player.x,player.y);
          e.ang+=(ang-e.ang)*.04;
          e.x+=Math.cos(e.ang)*e.sp*(.7+diff*.16);
          e.y+=Math.sin(e.ang)*e.sp*(.7+diff*.16);
          e.de=Math.sin((t+e.x)*.05)*.2;
          if(e.type==="shooter"){
            e.cd--;
            if(e.cd<=0){
              e.ch++;
              if(e.ch>40){
                const b=U.a(e.x,e.y,player.x,player.y);
                for(let k=-1;k<=1;k++){
                  shots.push({
                    x:e.x,y:e.y,
                    vx:Math.cos(b+k*.25)*(3.0+diff*.35),
                    vy:Math.sin(b+k*.25)*(3.0+diff*.35),
                    r:5,life:220
                  });
                  SFX.enemyShot();
                }
                e.ch=0; e.cd=U.ri(90,160);
              }
            }
          }
        }

        let remove=false;
        if(e.type==="cube"){
          if(U.circRect(player.x,player.y,player.r,e.x,e.y,e.s,e.s)){ playerHit(24); remove=true; }
        } else {
          const pts=U.tri(e.x,e.y,e.s*(1+(e.de||0)),e.ang);
          if(U.circPoly(player.x,player.y,player.r,pts)){ playerHit(28); remove=true; }
          else{
            const dd=U.d(player.x,player.y,e.x,e.y);
            if(dd>player.r+e.s && dd<player.r+e.s+16){
              mult=Math.min(9.9,mult+.002);
              if((t%24)===0)SFX.near();
            }
          }
        }

        const m=70;
        if(remove || e.x<-m||e.x>W+m||e.y<-m||e.y>H+m) enemies.splice(i,1);
      }

      // enemy shots
      for(let i=shots.length-1;i>=0;i--){
        const p=shots[i];
        p.x+=p.vx; p.y+=p.vy; p.life--;
        if(U.d(player.x,player.y,p.x,p.y)<=player.r+p.r){
          playerHit(16);
          shots.splice(i,1);
          continue;
        }
        if(p.life<=0||p.x<-20||p.x>W+20||p.y<-20||p.y>H+20) shots.splice(i,1);
      }

      // player shots
      for(let i=pShots.length-1;i>=0;i--){
        const s=pShots[i];
        s.x+=s.vx; s.y+=s.vy; s.life--;
        let removeShot=false;

        for(let j=enemies.length-1;j>=0;j--){
          const e=enemies[j];
          let hit=false;
          if(e.type==="cube") hit=U.circRect(s.x,s.y,s.r,e.x,e.y,e.s,e.s);
          else hit=U.circPoly(s.x,s.y,s.r,U.tri(e.x,e.y,e.s*(1+(e.de||0)),e.ang));

          if(hit){
            sparkBurst(e.x,e.y,18,5.5,28,.95);
            SFX.boom();
            enemies.splice(j,1);
            removeShot=true;
            mult=Math.min(9.9,mult+0.12);
            break;
          }
        }

        if(removeShot||s.life<=0||s.x<-20||s.x>W+20||s.y<-20||s.y>H+20) pShots.splice(i,1);
      }

      // orbs
      for(let i=orbs.length-1;i>=0;i--){
        const o=orbs[i];
        o.x+=o.vx; o.y+=o.vy; o.life--; o.pulse+=0.15;
        if(U.d(player.x,player.y,o.x,o.y)<=player.r+o.r){
          player.energy=100;
          player.lives=Math.min(5,player.lives+1);
          updateLives();
          sparkBurst(o.x,o.y,26,6,30,1);
          SFX.heal();
          orbs.splice(i,1);
          continue;
        }
        if(o.life<=0||o.x<-40||o.x>W+40||o.y<-40||o.y>H+40) orbs.splice(i,1);
      }

      if(tunnelCollide()&&borderGrace===0) playerHit(2.2);

      for(let i=sparks.length-1;i>=0;i--){
        const s=sparks[i];
        s.x+=s.vx; s.y+=s.vy; s.vx*=.94; s.vy*=.94; s.life--;
        if(s.life<=0) sparks.splice(i,1);
      }

      mult=Math.max(1,mult-.0008);
      updateHUD();

      if(player.dead){
        state="over";
        if(distance>best){ best=distance; localStorage.setItem("vo_best",best); }
        res1.textContent="Distance: "+(distance|0)+" m";
        res2.textContent="Best: "+(best|0)+" m";
        hud.classList.add("hidden");
        pauseBtn.classList.add("hidden");
        over.classList.remove("hidden");
      }
    }

    // ---------- Draw ----------
    function drawPlayer(){
      for(let i=0;i<player.trail.length;i++){
        const p=player.trail[i], a=i/player.trail.length;
        ctx.fillStyle=`rgba(255,255,255,${a*.17})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,player.r*a*.8,0,Math.PI*2); ctx.fill();
      }

      if(player.inv>0&&((player.inv/4|0)%2===0)) return;

      const beat=Math.sin(player.pulse)*.12+1, halo=player.r*(2+Math.hypot(player.vx,player.vy)*.12)*beat;
      const g=ctx.createRadialGradient(player.x,player.y,player.r*.4,player.x,player.y,halo);
      g.addColorStop(0,"rgba(255,255,255,.55)");
      g.addColorStop(.4,"rgba(180,180,180,.18)");
      g.addColorStop(1,"rgba(180,180,180,0)");
      ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(player.x,player.y,halo,0,Math.PI*2); ctx.fill();

      ctx.fillStyle="#f2f2f2";
      ctx.beginPath();
      for(let i=0;i<=9;i++){
        const ang=i/9*Math.PI*2, def=1+Math.sin(player.pulse*1.5+i)*.12;
        const px=player.x+Math.cos(ang)*player.r*def, py=player.y+Math.sin(ang)*player.r*def;
        if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();

      ctx.fillStyle="#111";
      ctx.beginPath(); ctx.arc(player.x,player.y,player.r*.45*beat,0,Math.PI*2); ctx.fill();
    }

    function drawInvertEvent(){
      if(!invertEventActive) return;

      const p = invertProgress;
      const baseR = Math.min(W,H)*0.26;
      const sphereR = baseR * p;
      const icoR = baseR * (1-p);

      ctx.fillStyle = `rgba(0,0,0,${0.15*p})`;
      ctx.fillRect(0,0,W,H);

      ctx.save();
      ctx.translate(invertCx,invertCy);

      // icosahedron-like wire
      if(icoR>0.5){
        const spokes = 20;
        ctx.strokeStyle = `rgba(255,255,255,${0.8*(1-p)+0.1})`;
        ctx.lineWidth = 1.2;
        for(let i=0;i<spokes;i++){
          const a0 = (Math.PI*2/spokes)*i + t*0.01;
          const a1 = a0 + Math.PI*2/spokes;
          const r1 = icoR * (0.75 + 0.25*Math.sin(i+t*0.02));
          const x0 = Math.cos(a0)*r1, y0 = Math.sin(a0)*r1;
          const x1 = Math.cos(a1)*r1, y1 = Math.sin(a1)*r1;
          const xc = Math.cos((a0+a1)*0.5)*icoR*0.28, yc = Math.sin((a0+a1)*0.5)*icoR*0.28;
          ctx.beginPath();
          ctx.moveTo(x0,y0);
          ctx.lineTo(xc,yc);
          ctx.lineTo(x1,y1);
          ctx.stroke();
        }
      }

      // sphere morphing in
      if(sphereR>0.5){
        const grad = ctx.createRadialGradient(0,0,1,0,0,sphereR*1.4);
        grad.addColorStop(0,`rgba(255,255,255,${0.9*p})`);
        grad.addColorStop(1,`rgba(255,255,255,0)`);
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.arc(0,0,sphereR*1.4,0,Math.PI*2); ctx.fill();

        ctx.strokeStyle=`rgba(255,255,255,${0.95*p})`;
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,sphereR,0,Math.PI*2); ctx.stroke();
      }

      ctx.restore();
    }

    function render(){
      ctx.fillStyle="#000";
      ctx.fillRect(0,0,W,H);

      drawBG(2.4+(state==="play"?diff*0.35:0));

      if(state==="menu"){ requestAnimationFrame(loop); return; }

      drawTunnel();

      for(const e of enemies){
        if(e.type==="cube"){
          ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.ang);
          const s=e.s,d=s*.4;
          ctx.fillStyle="#3a3a3a"; ctx.fillRect(-s/2+d,-s/2-d,s,s);
          ctx.fillStyle="#000"; ctx.fillRect(-s/2,-s/2,s,s);
          ctx.strokeStyle="rgba(230,230,230,.9)";
          ctx.lineWidth=1.3;
          ctx.strokeRect(-s/2,-s/2,s,s);
          ctx.beginPath();
          ctx.moveTo(-s/2,-s/2); ctx.lineTo(-s/2+d,-s/2-d);
          ctx.moveTo(s/2,-s/2);  ctx.lineTo(s/2+d,-s/2-d);
          ctx.moveTo(s/2,s/2);   ctx.lineTo(s/2+d,s/2-d);
          ctx.stroke();
          ctx.restore();
        } else {
          const pts=U.tri(e.x,e.y,e.s*(1+(e.de||0)),e.ang);
          ctx.fillStyle="#000";
          ctx.beginPath();
          pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle=(e.type==="shooter"&&e.ch>0)?"rgba(255,255,255,.8)":"rgba(210,210,210,.7)";
          ctx.lineWidth=1.3;
          ctx.stroke();
        }
      }

      for(const p of shots){
        ctx.fillStyle="#000";
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="rgba(240,240,240,.85)";
        ctx.lineWidth=1.2;
        ctx.stroke();
      }

      for(const s of pShots){
        const g=ctx.createRadialGradient(s.x,s.y,1,s.x,s.y,s.r*2.4);
        g.addColorStop(0,"rgba(255,255,255,1)");
        g.addColorStop(1,"rgba(255,255,255,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*2.4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#fff";
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      }

      for(const o of orbs){
        const rr=o.r*(1+Math.sin(o.pulse)*0.15);
        const g=ctx.createRadialGradient(o.x,o.y,1,o.x,o.y,rr*2.2);
        g.addColorStop(0,"rgba(255,255,255,0.95)");
        g.addColorStop(0.5,"rgba(200,200,200,0.45)");
        g.addColorStop(1,"rgba(200,200,200,0)");
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(o.x,o.y,rr*2.2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#fff";
        ctx.beginPath(); ctx.arc(o.x,o.y,rr,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="rgba(20,20,20,0.8)";
        ctx.lineWidth=1.2;
        ctx.stroke();
      }

      drawPlayer();

      for(const s of sparks){
        const a=s.life/s.max, v=(s.t*255)|0;
        ctx.fillStyle=`rgba(${v},${v},${v},${a})`;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r*a,0,Math.PI*2); ctx.fill();
      }

      drawInvertEvent();

      ctx.fillStyle="rgba(255,255,255,.013)";
      for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);

      requestAnimationFrame(loop);
    }

    function loop(){ update(); render(); }

    // ---------- Input ----------
    addEventListener("keydown",e=>{
      keys[e.key.toLowerCase()]=true;
      if(e.code==="Space"){ e.preventDefault(); fireHeld=true; firePlayerShot(); }
      if(e.code==="Escape"){ togglePause(); }
    });

    addEventListener("keyup",e=>{
      keys[e.key.toLowerCase()]=false;
      if(e.code==="Space") fireHeld=false;
    });

    cvs.addEventListener("mousedown",e=>{
      touch.on=true; touch.x=e.clientX; touch.y=e.clientY;
      if(e.button===0){ fireHeld=true; firePlayerShot(); }
    });

    addEventListener("mousemove",e=>{ if(touch.on){touch.x=e.clientX;touch.y=e.clientY;} });
    addEventListener("mouseup",()=>{ touch.on=false; fireHeld=false; });

    cvs.addEventListener("touchstart",e=>{
      const t0=e.touches[0];
      touch.on=true; touch.x=t0.clientX; touch.y=t0.clientY;
      const now=performance.now();
      if(now-lastTap<260) firePlayerShot();
      lastTap=now;
    },{passive:true});

    cvs.addEventListener("touchmove",e=>{
      const t0=e.touches[0];
      touch.on=true; touch.x=t0.clientX; touch.y=t0.clientY;
    },{passive:true});

    cvs.addEventListener("touchend",()=>{ touch.on=false; });

    cvs.addEventListener("contextmenu",e=>{ e.preventDefault(); firePlayerShot(); });

    // ---------- Buttons ----------
    startBtn.addEventListener("click",startGame);
    restartBtn.addEventListener("click",startGame);
    pauseBtn.addEventListener("click",()=>togglePause());
    resumeBtn.addEventListener("click",()=>togglePause(false));
    quitBtn.addEventListener("click",quitToMenu);

    addEventListener("pointerdown",()=>{SFX.init();SFX.resume();},{once:true});

    requestAnimationFrame(loop);
  })();
  </script>
</body>

<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Subatomic Minimal Prototype</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;}
  canvas{display:block;background:#000;}
  #hint{
    position:fixed;left:12px;bottom:12px;color:#fff;
    font:12px monospace;opacity:.5;user-select:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Drag para energía/dirección · click para iniciar audio</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W,H; function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;} resize(); addEventListener('resize',resize);

const bgParticles = Array.from({length:140},()=>({
  x:Math.random()*W,y:Math.random()*H,
  v:(Math.random()*0.5+0.1),
  a:Math.random()*Math.PI*2,
  r:Math.random()*1.5+0.3
}));

let pointer = {down:false, x:0, y:0, sx:0, sy:0};
let shots = [];
let impacts = [];
let explosionParticles = [];
let detonations = [];
let targets = [];
const MAX_TARGETS = 8;

function randTarget(){
  const moving = Math.random() < 0.5;
  const roll = Math.random();
  const type = roll < 0.33 ? "circle" : (roll < 0.66 ? "star" : "poly");
  return {
    x:W*(0.2+Math.random()*0.7),
    y:H*(0.2+Math.random()*0.6),
    r:14+Math.random()*12,
    alive:true,
    moving,
    vx: moving ? (Math.random()*1.2-0.6) : 0,
    vy: moving ? (Math.random()*1.2-0.6) : 0,
    type,
    phase: Math.random()*Math.PI*2,
    sides: 3 + Math.floor(Math.random()*3), // 3..5
    morph: 0
  };
}
function fillTargets(){
  while(targets.filter(t=>t.alive).length < MAX_TARGETS){
    targets.push(randTarget());
  }
}
fillTargets();

canvas.addEventListener('pointerdown',e=>{
  pointer.down=true; pointer.sx=e.clientX; pointer.sy=e.clientY;
  pointer.x=e.clientX; pointer.y=e.clientY;
});
canvas.addEventListener('pointermove',e=>{
  pointer.x=e.clientX; pointer.y=e.clientY;
});
canvas.addEventListener('pointerup',e=>{
  if(!pointer.down) return;
  pointer.down=false;
  const dx = pointer.sx - pointer.x;
  const dy = pointer.sy - pointer.y;
  shots.push({
    x:pointer.sx,y:pointer.sy,
    vx:-dx/15, vy:-dy/15,
    life:0, dormant:false
  });
});

function addImpact(x,y,energy,type){
  impacts.push({
    x,y, t:0, energy, type,
    rings: Array.from({length:6},(_,i)=>({r:i*8+6, w:Math.random()*2+1, jitter:Math.random()*3+1}))
  });

  if(type==="poly"){
    const count = 120 + Math.floor(energy*8);
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const sp = (Math.random()*5+2) * (0.8+energy*0.08);
      explosionParticles.push({
        x,y,
        vx:Math.cos(a)*sp,
        vy:Math.sin(a)*sp,
        life:0,
        max:40+Math.random()*50,
        size:Math.random()*3+1,
        spin:(Math.random()-0.5)*0.8,
        tri:true
      });
    }
  } else {
    const count = 80 + Math.floor(energy*6);
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const sp = (Math.random()*3+1) * (0.8+energy*0.1);
      explosionParticles.push({
        x,y,
        vx:Math.cos(a)*sp,
        vy:Math.sin(a)*sp,
        life:0,
        max:60+Math.random()*50,
        size:Math.random()*2+0.5,
        spin:(Math.random()-0.5)*0.3,
        tri:false
      });
    }
  }

  if(audio.started) audio.hit(energy);
}

function addDetonation(x,y){
  detonations.push({x,y,t:0});
  const count = 140 + Math.floor(Math.random()*60);
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2;
    const sp = (Math.random()*6+2);
    explosionParticles.push({
      x,y,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp,
      life:0,
      max:40+Math.random()*40,
      size:Math.random()*3+1,
      spin:(Math.random()-0.5)*0.6,
      tri:true
    });
  }
  if(audio.started) audio.hit(8);
}

function drawCircle(t){
  ctx.beginPath();
  ctx.arc(0,0,t.r,0,Math.PI*2);
  ctx.stroke();
}

function drawStarCircle(t){
  const steps = 80;
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const a = i/steps * Math.PI*2;
    const wave = Math.sin(a*8 + t.phase + t.morph);
    const spike = Math.pow(Math.abs(wave), 0.6) * 4;
    const rr = t.r + (wave>0? spike : -spike*0.4);
    const x = Math.cos(a)*rr, y = Math.sin(a)*rr;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.stroke();
}

function drawMorphPoly(t){
  const n = t.sides;
  const morph = (Math.sin(t.morph)+1)/2;
  const r = t.r * (0.6 + 0.4*morph);
  ctx.beginPath();
  for(let i=0;i<=n;i++){
    const a = i/n * Math.PI*2 + t.phase;
    const rr = r + Math.sin(a*3 + t.morph)*1.2;
    const x = Math.cos(a)*rr, y = Math.sin(a)*rr;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.stroke();

  if(morph > 0.98){
    t.sides = 3 + Math.floor(Math.random()*4); // 3..6
  }
}

function drawImpact(im){
  ctx.save();
  ctx.translate(im.x, im.y);

  if(im.type==="circle"){
    ctx.strokeStyle="rgba(255,255,255,0.6)";
    im.rings.forEach(r=>{
      ctx.lineWidth=r.w;
      ctx.beginPath();
      ctx.arc(0,0,r.r,0,Math.PI*2);
      ctx.stroke();
      r.r += 1.6;
      r.w *= 0.985;
    });
  } else if(im.type==="star"){
    ctx.strokeStyle="rgba(255,255,255,0.6)";
    im.rings.forEach(r=>{
      ctx.lineWidth=r.w;
      ctx.beginPath();
      for(let a=0;a<Math.PI*2;a+=0.18){
        const rr = r.r + Math.sin(a*7 + im.t*0.2)*3;
        ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
      }
      ctx.closePath(); ctx.stroke();
      r.r += 1.5;
      r.w *= 0.985;
    });
  } else if(im.type==="poly"){
    // onda tipo ecualización agresiva
    ctx.strokeStyle="rgba(255,255,255,0.7)";
    const base = 14 + im.t*1.4;
    ctx.beginPath();
    for(let a=0;a<Math.PI*2;a+=0.1){
      const spike = Math.sin(a*14 + im.t*0.6)*6 + Math.sin(im.t*0.3+a*3)*4;
      const rr = base + spike;
      ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
    }
    ctx.closePath(); ctx.stroke();

    // líneas radiales agresivas
    ctx.strokeStyle="rgba(255,255,255,0.35)";
    for(let i=0;i<28;i++){
      const a = i*(Math.PI*2/28) + im.t*0.02;
      const len = 18 + Math.sin(im.t*0.4+i)*20;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*5, Math.sin(a)*5);
      ctx.lineTo(Math.cos(a)*len, Math.sin(a)*len);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function update(){
  ctx.clearRect(0,0,W,H);

  // ambient
  ctx.fillStyle="#fff";
  bgParticles.forEach(p=>{
    p.x+=Math.cos(p.a)*p.v; p.y+=Math.sin(p.a)*p.v;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.globalAlpha=0.12;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // targets
  targets.forEach(t=>{
    if(!t.alive) return;
    if(t.moving){
      t.x+=t.vx; t.y+=t.vy;
      if(t.x<t.r || t.x>W-t.r) t.vx*=-1;
      if(t.y<t.r || t.y>H-t.r) t.vy*=-1;
    }
    t.morph += 0.03;
    ctx.save();
    ctx.translate(t.x,t.y);
    ctx.strokeStyle="#fff"; ctx.lineWidth=1;
    if(t.type==="circle") drawCircle(t);
    else if(t.type==="star") drawStarCircle(t);
    else drawMorphPoly(t);
    ctx.restore();
  });

  // shots
  shots.forEach(s=>{
    if(!s.dormant){
      s.x+=s.vx; s.y+=s.vy;
      s.vx*=0.995; s.vy*=0.995;
      if(Math.hypot(s.vx,s.vy) < 0.08){ s.dormant=true; s.vx=0; s.vy=0; }
    }
    s.life++;
    if(!s.dormant){
      ctx.strokeStyle="rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.vx*3, s.y - s.vy*3);
      ctx.stroke();
    }
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(s.x,s.y,2,0,Math.PI*2); ctx.fill();

    targets.forEach(t=>{
      if(t.alive && Math.hypot(s.x-t.x,s.y-t.y) < t.r){
        t.alive=false;
        addImpact(s.x,s.y, Math.hypot(s.vx,s.vy)+2, t.type);
      }
    });

    if(!s.dormant){
      shots.forEach(o=>{
        if(o!==s && o.dormant && Math.hypot(s.x-o.x,s.y-o.y) < 6){
          o.dormant=false; o.life=999;
          addDetonation(o.x,o.y);
        }
      });
    }
  });
  shots = shots.filter(s=>s.life<800 && s.x>-50 && s.x<W+50 && s.y>-50 && s.y<H+50);

  // impacts
  impacts.forEach(im=>{ im.t++; drawImpact(im); });
  impacts = impacts.filter(im=>im.t<220);

  // abrupt detonation flashes
  detonations.forEach(d=>{
    d.t++;
    ctx.strokeStyle = `rgba(255,255,255,${1 - d.t/20})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(d.x,d.y, d.t*6, 0, Math.PI*2);
    ctx.stroke();
  });
  detonations = detonations.filter(d=>d.t<20);

  // explosion particles
  explosionParticles.forEach(p=>{
    p.life++;
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98; p.vy *= 0.98;
    const alpha = 1 - p.life/p.max;

    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.life * p.spin);
    ctx.strokeStyle = `rgba(255,255,255,${alpha*0.85})`;
    ctx.lineWidth = 1;

    if(p.tri){
      ctx.beginPath();
      ctx.moveTo(-p.size, -p.size);
      ctx.lineTo(p.size, 0);
      ctx.lineTo(-p.size, p.size);
      ctx.closePath();
      ctx.stroke();
    }else{
      ctx.beginPath();
      ctx.moveTo(-p.size*2,0);
      ctx.lineTo(p.size*2,0);
      ctx.stroke();
    }
    ctx.restore();
  });
  explosionParticles = explosionParticles.filter(p=>p.life<p.max);

  if(pointer.down){
    ctx.strokeStyle="rgba(255,255,255,0.4)";
    ctx.beginPath();
    ctx.moveTo(pointer.sx, pointer.sy);
    ctx.lineTo(pointer.x, pointer.y);
    ctx.stroke();
  }

  fillTargets();
  requestAnimationFrame(update);
}
update();

/* --- Audio experimental mínimo --- */
const audio = {
  ctx:null, started:false,
  init(){
    if(this.started) return;
    this.ctx = new (window.AudioContext||window.webkitAudioContext)();
    this.started=true;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type="sine"; o.frequency.value=60;
    g.gain.value=0.03;
    o.connect(g).connect(this.ctx.destination);
    o.start();
  },
  hit(energy=3){
    if(!this.started) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    const f = 200 + energy*40 + Math.random()*80;
    o.frequency.value=f;
    o.type="triangle";
    g.gain.value=0.06;
    o.connect(g).connect(this.ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.35);
    o.stop(this.ctx.currentTime+0.35);
  }
};
window.addEventListener('pointerdown',()=>audio.init(),{once:true});
</script>
</body>
</html>

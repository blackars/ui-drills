
<head>
<!--AUTO GENERATED BY CODVERTER.COM-->
<script src="scripts.js"></script>
<link href="styles.css" rel="stylesheet"/>
</head>
<div id="bat-space-wrap">
  <canvas id="bat-space"></canvas>
  <svg id="bat-spiral"></svg>
</div>

<style>
  html, body {
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:#05070a;
    overflow:hidden;
  }
  #bat-space-wrap{
    position:fixed;
    inset:0;
    background:#05070a;
    overflow:hidden;
  }
  #bat-space, #bat-spiral{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }
  #bat-spiral{ pointer-events:none; }

  .spiral-line{
    font-family: Inter, Arial, sans-serif;
    font-weight: 800;
    fill: rgba(210,220,235,.9);
    letter-spacing: 1px;
    text-transform: uppercase;
    dominant-baseline: middle;
  }
</style>

<script>
(() => {
  const wrap = document.getElementById("bat-space-wrap");
  const canvas = document.getElementById("bat-space");
  const svg = document.getElementById("bat-spiral");
  const ctx = canvas.getContext("2d");

  const DPR = Math.max(1, window.devicePixelRatio || 1);
  const TAU = Math.PI * 2;

  // ---------- CONFIG ----------
  const WORDS = ["ECHOLOCATION", "NAVIGATION", "SWARM MEMORY", "BAT LANGUAGE MAP"];
  const SPIRAL_LINES = 4;             // 2,3 o 4
  const TURNS = 3.3;                  // vueltas hacia el centro
  const R_START = 360;                // radio exterior inicial
  const R_END = 24;                   // radio final (cerca de partículas)
  const BASE_FONT = 28;               // tamaño fuente en exterior
  const MIN_FONT = 2.2;               // tamaño mínimo (casi partícula)
  const FLOW_SPEED = 0.035;           // velocidad de “caída”
  const SEGMENTS = 420;               // suavidad del path espiral

  // partículas centro
  const P_COUNT = 1300;
  const P_ORBIT_R = 130;
  const P_ROT = 0.0011;

  let w,h,cx,cy,t=0,pAngle=0;
  let particles = [];

  // ---------- helpers ----------
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }

  function resize(){
    const r = wrap.getBoundingClientRect();
    w = r.width; h = r.height; cx=w/2; cy=h/2;

    canvas.width = Math.floor(w * DPR);
    canvas.height = Math.floor(h * DPR);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(DPR,0,0,DPR,0,0);

    svg.setAttribute("viewBox", `${-w/2} ${-h/2} ${w} ${h}`);
    buildSpiralSVG();
    initParticles();
  }

  function initParticles(){
    particles = [];
    for(let i=0;i<P_COUNT;i++){
      const a = Math.random()*TAU;
      const rr = Math.sqrt(Math.random()) * P_ORBIT_R;
      const z = Math.random()*2 - 1;
      particles.push({
        x: Math.cos(a)*rr,
        y: Math.sin(a)*rr*1.08,
        z,
        seed: Math.random()*1000
      });
    }
  }

  // Espiral: r = lerp(R_START, R_END, u), theta = u * TURNS*TAU + phase
  function spiralPathD(phase=0){
    let d = "";
    for(let i=0;i<=SEGMENTS;i++){
      const u = i/SEGMENTS;
      const theta = u * TURNS * TAU + phase;
      const r = lerp(R_START, R_END, u);
      const x = Math.cos(theta)*r;
      const y = Math.sin(theta)*r;

      if(i===0) d += `M ${x.toFixed(2)} ${y.toFixed(2)} `;
      else d += `L ${x.toFixed(2)} ${y.toFixed(2)} `;
    }
    return d.trim();
  }

  function buildSpiralSVG(){
    svg.innerHTML = "";
    const NS = "http://www.w3.org/2000/svg";
    const XLINK = "http://www.w3.org/1999/xlink";

    const defs = document.createElementNS(NS,"defs");
    svg.appendChild(defs);

    for(let i=0;i<SPIRAL_LINES;i++){
      const phase = (i / SPIRAL_LINES) * TAU * 0.72;
      const pid = `spiral-path-${i}`;

      const path = document.createElementNS(NS,"path");
      path.setAttribute("id", pid);
      path.setAttribute("d", spiralPathD(phase));
      path.setAttribute("fill","none");
      defs.appendChild(path);

      const text = document.createElementNS(NS,"text");
      text.setAttribute("class","spiral-line");
      text.setAttribute("data-line", i);

      const tp = document.createElementNS(NS,"textPath");
      tp.setAttributeNS(XLINK,"xlink:href",`#${pid}`);
      tp.setAttribute("href",`#${pid}`);
      tp.setAttribute("startOffset", `${(i*7)%100}%`);
      tp.setAttribute("text-anchor","start");

      // repetición para “cinta” continua
      tp.textContent = (WORDS[i % WORDS.length] + " • ").repeat(22);

      text.appendChild(tp);
      svg.appendChild(text);
    }
  }

  function drawParticles(){
    pAngle += P_ROT;
    const ca = Math.cos(pAngle), sa = Math.sin(pAngle);

    for(const p of particles){
      const x = p.x*ca - p.y*sa;
      const y = p.x*sa + p.y*ca;
      const depth = 0.75 + (p.z+1)*0.35;
      const sx = cx + x*depth;
      const sy = cy + y*depth;

      const a = 0.14 + depth*0.24;
      const s = 0.7 + depth*1.1;

      ctx.fillStyle = `rgba(210,225,245,${a})`;
      ctx.beginPath();
      ctx.arc(sx,sy,s,0,TAU);
      ctx.fill();
    }
  }

  function animateSpiralTypography(){
    const lines = svg.querySelectorAll(".spiral-line");
    lines.forEach((line, i) => {
      const tp = line.querySelector("textPath");
      if(!tp) return;

      // flujo hacia adentro
      const off = ((t*18 + i*9) % 100);
      tp.setAttribute("startOffset", `${off}%`);

      // tamaño/alpha progresivo (simulación de “caer y fundirse”)
      // usamos onda para que el bloque completo respire mientras se desplaza
      const k = 0.5 + 0.5*Math.sin((t*1.2) + i*0.7); // 0..1
      const fs = lerp(BASE_FONT, MIN_FONT, clamp((t*0.08 + i*0.03) % 1, 0, 1));
      const alpha = lerp(0.92, 0.20, clamp((t*0.08 + i*0.03) % 1, 0, 1));

      line.setAttribute("font-size", fs.toFixed(2));
      line.setAttribute("fill", `rgba(210,220,235,${alpha.toFixed(3)})`);

      // pequeño blur al acercarse al centro (opcional visual)
      line.style.filter = `blur(${(1-k)*0.4}px)`;
    });
  }

  function drawBg(){
    ctx.fillStyle = "#05070a";
    ctx.fillRect(0,0,w,h);
  }

  function loop(){
    t += FLOW_SPEED;

    drawBg();
    drawParticles();
    animateSpiralTypography();

    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>

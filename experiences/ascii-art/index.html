<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASCII Art Effect</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
  </style>
</head>
<body>
<div id="text-mask-hero" style="position:relative;width:100%;height:100vh;overflow:hidden;background:#111;">
  <canvas id="tmh-canvas" style="display:block;width:100%;height:100%;"></canvas>
</div>

<script>
(() => {
  const container = document.getElementById("text-mask-hero");
  const canvas = document.getElementById("tmh-canvas");
  const ctx = canvas.getContext("2d", { alpha: false });

  const BACKGROUND = "#131313";
  const TEXT_COLOR = "rgba(230,230,230,0.9)";
  const TEXT_FADE = "rgba(255,255,255,0.12)";
  const FONT_FAMILY = "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace";
  const FONT_SIZE = 13;
  const LINE_HEIGHT = 14;
  const CHAR_WIDTH = 8;
  const MOUSE_RADIUS = 110;
  const CLICK_FORCE = 22;
  const HOVER_FORCE = 8;
  const DAMPING = 0.88;
  const SPRING = 0.08;
  const REWRITE_SPEED = 0.06;

  const sourceText = `
SCHEMA AS A SYSTEM · THE HARD FIELDS ALREADY BUILT · AGENT NATIVE NO DRIFT ·
FETCH LAYER SOLVED · STUDIO EDITORS USE · WEBHOOKS INVALIDATE ON PUBLISH ·
EVERY DECISION ALREADY MADE · PAGE BUILDER WITH GUARDRAILS · JUST CLONED ·
A LINK FIELD THAT HANDLES EVERYTHING · MEDIA FIELD ONE SHAPE · CDN BYPASSED ·
DRAFT MODE WIRED · A SYSTEM NOT A STARTER · PRODUCTION FOUNDATION ·
COMMIT ONCE REUSE EVERYWHERE · TYPED COMPOSED SWAPPABLE ·
`;

  const glyphs = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#.:/\\-_+=*";
  const particles = [];
  let cols = 0, rows = 0, dpr = Math.max(1, window.devicePixelRatio || 1);
  let mouse = { x: -9999, y: -9999, down: false };
  let maskData = null;
  let maskCanvas = document.createElement("canvas");
  let maskCtx = maskCanvas.getContext("2d");

  class CharParticle {
    constructor(x, y, char) {
      this.homeX = x;
      this.homeY = y;
      this.x = x + (Math.random() - 0.5) * 20;
      this.y = y + (Math.random() - 0.5) * 20;
      this.vx = 0;
      this.vy = 0;
      this.char = char;
      this.alpha = 0.35 + Math.random() * 0.65;
    }

    update() {
      const dxh = this.homeX - this.x;
      const dyh = this.homeY - this.y;
      this.vx += dxh * SPRING;
      this.vy += dyh * SPRING;

      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist2 = dx * dx + dy * dy;
      const r2 = MOUSE_RADIUS * MOUSE_RADIUS;

      if (dist2 < r2) {
        const dist = Math.sqrt(dist2) || 0.001;
        const force = (1 - dist / MOUSE_RADIUS) * (mouse.down ? CLICK_FORCE : HOVER_FORCE);
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }

      this.vx *= DAMPING;
      this.vy *= DAMPING;
      this.x += this.vx;
      this.y += this.vy;

      if (Math.random() < REWRITE_SPEED) {
        if (Math.random() < 0.65) {
          this.char = sourceText[(Math.random() * sourceText.length) | 0];
        } else {
          this.char = glyphs[(Math.random() * glyphs.length) | 0];
        }
      }
    }

    draw() {
      ctx.globalAlpha = this.alpha;
      ctx.fillText(this.char, this.x, this.y);
    }
  }

  function resize() {
    const rect = container.getBoundingClientRect();
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.font = `${FONT_SIZE}px ${FONT_FAMILY}`;
    ctx.textBaseline = "top";
    cols = Math.floor(rect.width / CHAR_WIDTH);
    rows = Math.floor(rect.height / LINE_HEIGHT);

    buildMaskAndParticles(rect.width, rect.height);
  }

  function buildMaskAndParticles(w, h) {
    particles.length = 0;

    maskCanvas.width = w;
    maskCanvas.height = h;
    maskCtx.clearRect(0, 0, w, h);

    // Generative mask: circle + rectangle composition
    maskCtx.fillStyle = "#fff";
    maskCtx.beginPath();
    maskCtx.arc(w * 0.5, h * 0.42, Math.min(w, h) * 0.22, 0, Math.PI * 2);
    maskCtx.fill();
    maskCtx.fillRect(w * 0.28, h * 0.38, w * 0.44, h * 0.28);
    maskCtx.beginPath();
    maskCtx.ellipse(w * 0.5, h * 0.45, w * 0.35, h * 0.18, 0, 0, Math.PI * 2);
    maskCtx.fill();

    maskData = maskCtx.getImageData(0, 0, w, h).data;

    let i = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * CHAR_WIDTH + 2;
        const y = r * LINE_HEIGHT + 2;
        const px = Math.min(w - 1, Math.max(0, x | 0));
        const py = Math.min(h - 1, Math.max(0, y | 0));
        const idx = (py * w + px) * 4;
        const a = maskData[idx + 3];
        const lum = (maskData[idx] + maskData[idx + 1] + maskData[idx + 2]) / 3;

        if (a > 20 && lum > 40) {
          const ch = sourceText[i++ % sourceText.length];
          particles.push(new CharParticle(x, y, ch));
        }
      }
    }
  }

  function renderBackgroundText(w, h) {
    ctx.fillStyle = TEXT_FADE;
    ctx.font = `${FONT_SIZE - 1}px ${FONT_FAMILY}`;
    const line = "EVERY DECISION ALREADY MADE · SCHEMA AS A SYSTEM · ";
    for (let y = 0; y < h; y += LINE_HEIGHT) {
      let x = -((y / LINE_HEIGHT * 17) % 120);
      while (x < w + 200) {
        ctx.fillText(line, x, y);
        x += 320;
      }
    }
    ctx.font = `${FONT_SIZE}px ${FONT_FAMILY}`;
  }

  function animate() {
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;

    ctx.fillStyle = BACKGROUND;
    ctx.fillRect(0, 0, w, h);

    renderBackgroundText(w, h);

    ctx.fillStyle = TEXT_COLOR;
    for (let p of particles) {
      p.update();
      p.draw();
    }

    requestAnimationFrame(animate);
  }

  container.addEventListener("mousemove", (e) => {
    const r = container.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
  });

  container.addEventListener("mouseleave", () => {
    mouse.x = -9999;
    mouse.y = -9999;
    mouse.down = false;
  });

  container.addEventListener("mousedown", () => {
    mouse.down = true;
  });

  window.addEventListener("mouseup", () => {
    mouse.down = false;
  });

  container.addEventListener("click", (e) => {
    const r = container.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;

    for (let p of particles) {
      const dx = p.x - cx;
      const dy = p.y - cy;
      const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
      if (d < MOUSE_RADIUS * 1.4) {
        const f = (1 - d / (MOUSE_RADIUS * 1.4)) * 35;
        p.vx += (dx / d) * f;
        p.vy += (dy / d) * f;
      }
    }
  });

  window.addEventListener("resize", resize);

  resize();
  animate();
})();
</script>
</body>
</html>

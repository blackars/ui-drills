<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circle Typography</title>
</head>
<body>
<div id="bat-space-wrap">
  <canvas id="bat-space"></canvas>
  <svg id="bat-labels" aria-label="Bat language categories"></svg>
</div>

<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: #05070a;
    overflow: hidden;
  }
  #bat-space-wrap{
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background:#05070a;
    overflow:hidden;
  }
  #bat-space,
  #bat-labels{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }
  .ring-label{
    font: 800 16px Inter, Arial, sans-serif;
    fill: rgba(165,178,194,.78);
    letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events:auto;
    cursor:pointer;
    transition: fill .18s ease, filter .18s ease;
    user-select:none;
  }
  .ring-label.active{
    fill: rgba(245,248,255,.98);
    filter: drop-shadow(0 0 4px rgba(255,255,255,.22));
  }
</style>

<script>
(() => {
  const wrap = document.getElementById("bat-space-wrap");
  const canvas = document.getElementById("bat-space");
  const svg = document.getElementById("bat-labels");
  const ctx = canvas.getContext("2d");

  const TAU = Math.PI * 2;
  const DPR = Math.max(1, window.devicePixelRatio || 1);

  // ---------------- CONFIG ----------------
  const categories = [
    "ECHOLOCATION","ATTRACTION","ATTENTION","SOLICITATION",
    "TERRITORY","FEAR","BAT LANGUAGE MAP","NAVIGATION","SWARM MEMORY"
  ];

  const OUTER_R = 360, INNER_R = 300, VOLUME_R = 250;
  const POINTS = 1800, CLUSTERS_PER_CAT = 3, ROT_SPEED = 0.0009;
  const TEXT_R = (OUTER_R + INNER_R) * 0.5;

  // Interactividad mouse (suave)
  const MOUSE_RADIUS = 140;    // radio de influencia local
  const MOUSE_FORCE = 0.18;    // fuerza de repulsión local
  const PARALLAX_X = 16;       // desplazamiento global X
  const PARALLAX_Y = 12;       // desplazamiento global Y
  const MOUSE_LERP = 0.12;     // suavizado del puntero

  let w,h,cx,cy,angle=0,activeCat=0;
  let points=[], clusters=[];
  let labelNodes = [];

  let mouse = {
    x: 0, y: 0,        // suavizado actual
    tx: 0, ty: 0,      // target
    inside: false
  };

  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

  // ---------- field ----------
  function randomSpherePoint(radius=1){
    const u=Math.random(), v=Math.random();
    const t=TAU*u, p=Math.acos(2*v-1), rr=Math.cbrt(Math.random())*radius;
    return {
      x: rr*Math.sin(p)*Math.cos(t),
      y: rr*Math.sin(p)*Math.sin(t),
      z: rr*Math.cos(p)
    };
  }

  function initField(){
    points=[]; clusters=[];
    for(let c=0;c<categories.length;c++){
      const arr=[];
      for(let k=0;k<CLUSTERS_PER_CAT;k++) arr.push(randomSpherePoint(0.9));
      clusters.push(arr);
    }
    for(let i=0;i<POINTS;i++){
      const p=randomSpherePoint(1.0);
      p.x*=0.92; p.y*=1.12;
      points.push(p);
    }
  }

  function dist3(a,b){
    const dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z;
    return Math.sqrt(dx*dx+dy*dy+dz*dz);
  }

  function project(p, rot){
    const cyy=Math.cos(rot), syy=Math.sin(rot);
    const cxx=Math.cos(rot*0.35), sxx=Math.sin(rot*0.35);

    let x=p.x*cyy-p.z*syy;
    let z=p.x*syy+p.z*cyy;
    let y=p.y;

    const y2=y*cxx-z*sxx;
    const z2=y*sxx+z*cxx;
    y=y2; z=z2;

    const k=2.8/(2.8+z);
    return { x:cx+x*VOLUME_R*k, y:cy+y*VOLUME_R*k, k };
  }

  // ---------- canvas draw ----------
  function drawRings(){
    ctx.strokeStyle="rgba(180,200,220,0.25)";
    ctx.beginPath();
    ctx.arc(cx,cy,OUTER_R,0,TAU);
    ctx.stroke();

    ctx.strokeStyle="rgba(130,160,190,0.18)";
    ctx.beginPath();
    ctx.arc(cx,cy,INNER_R,0,TAU);
    ctx.stroke();
  }

  function drawPoints(){
    const act = clusters[activeCat];

    // parallax global (suave)
    const nx = w ? (mouse.x / w - 0.5) : 0;
    const ny = h ? (mouse.y / h - 0.5) : 0;
    const parallaxX = nx * PARALLAX_X;
    const parallaxY = ny * PARALLAX_Y;

    for(const p of points){
      const pr = project(p, angle);

      // afinidad a clúster activo
      let rel = 0;
      for(const c of act){
        const d = dist3(p,c);
        rel = Math.max(rel, clamp(1 - d/0.55, 0, 1));
      }

      // posición final base con parallax
      let fx = pr.x + parallaxX * pr.k;
      let fy = pr.y + parallaxY * pr.k;

      // repulsión local alrededor del cursor
      if(mouse.inside){
        const dx = fx - mouse.x;
        const dy = fy - mouse.y;
        const d2 = dx*dx + dy*dy;
        const r2 = MOUSE_RADIUS * MOUSE_RADIUS;

        if(d2 < r2){
          const d = Math.sqrt(d2) || 0.0001;
          const t = 1 - d / MOUSE_RADIUS; // 0..1
          // empuje suave, más fuerte cerca del cursor
          const push = (t*t) * MOUSE_FORCE * (10 + 18*pr.k);
          fx += (dx / d) * push;
          fy += (dy / d) * push;
        }
      }

      const alpha = clamp(0.06 + 0.20*pr.k + rel*0.75, 0.03, 1);
      const size = (rel>0.35 ? 1.6 : 1.0) * pr.k;

      ctx.fillStyle = rel>0.35
        ? `rgba(245,250,255,${alpha})`
        : `rgba(180,195,210,${alpha*0.58})`;

      ctx.beginPath();
      ctx.arc(fx,fy,size,0,TAU);
      ctx.fill();
    }
  }

  // ---------- SVG perfect circular typography ----------
  const NS = "http://www.w3.org/2000/svg";
  const XLINK = "http://www.w3.org/1999/xlink";

  function buildLabels(){
    svg.innerHTML = "";
    labelNodes = [];

    svg.setAttribute("viewBox", `${-w/2} ${-h/2} ${w} ${h}`);
    svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

    const defs = document.createElementNS(NS, "defs");
    const path = document.createElementNS(NS, "path");
    path.setAttribute("id", "labels-circle-path");
    path.setAttribute("d", `M 0 ${-TEXT_R} A ${TEXT_R} ${TEXT_R} 0 1 1 0 ${TEXT_R} A ${TEXT_R} ${TEXT_R} 0 1 1 0 ${-TEXT_R}`);
    defs.appendChild(path);
    svg.appendChild(defs);

    const n = categories.length;
    for(let i=0;i<n;i++){
      const text = document.createElementNS(NS, "text");
      text.setAttribute("class", "ring-label" + (i===activeCat ? " active" : ""));
      text.setAttribute("data-idx", i);

      const tp = document.createElementNS(NS, "textPath");
      tp.setAttributeNS(XLINK, "xlink:href", "#labels-circle-path");
      tp.setAttribute("href", "#labels-circle-path");
      tp.setAttribute("startOffset", `${(i/n)*100}%`);
      tp.setAttribute("text-anchor", "middle");
      tp.textContent = categories[i];

      text.appendChild(tp);

      text.addEventListener("click", () => {
        activeCat = i;
        refreshActiveLabel();
      });
      text.addEventListener("mouseenter", () => { wrap.style.cursor = "pointer"; });
      text.addEventListener("mouseleave", () => { wrap.style.cursor = "default"; });

      svg.appendChild(text);
      labelNodes.push(text);
    }
  }

  function refreshActiveLabel(){
    labelNodes.forEach((n, i) => n.classList.toggle("active", i===activeCat));
  }

  // ---------- loop / resize ----------
  function resize(){
    const r = wrap.getBoundingClientRect();
    w = r.width; h = r.height; cx=w/2; cy=h/2;

    canvas.width = Math.floor(w * DPR);
    canvas.height = Math.floor(h * DPR);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(DPR,0,0,DPR,0,0);

    // reset mouse center on resize
    mouse.x = mouse.tx = cx;
    mouse.y = mouse.ty = cy;

    initField();
    buildLabels();
    refreshActiveLabel();
  }

  function loop(){
    // suavizado mouse
    mouse.x += (mouse.tx - mouse.x) * MOUSE_LERP;
    mouse.y += (mouse.ty - mouse.y) * MOUSE_LERP;

    ctx.clearRect(0,0,w,h);
    ctx.fillStyle="#05070a";
    ctx.fillRect(0,0,w,h);

    angle += ROT_SPEED;

    drawRings();
    drawPoints();

    requestAnimationFrame(loop);
  }

  // Mouse tracking para parallax/repulsión
  wrap.addEventListener("mousemove", (e) => {
    const r = wrap.getBoundingClientRect();
    mouse.tx = e.clientX - r.left;
    mouse.ty = e.clientY - r.top;
    mouse.inside = true;
  });

  wrap.addEventListener("mouseleave", () => {
    mouse.inside = false;
    // vuelve suave al centro
    mouse.tx = cx;
    mouse.ty = cy;
    wrap.style.cursor = "default";
  });

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>

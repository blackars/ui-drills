<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip-Path Effect</title>
  <style>
    :root {
      --x: 50vw;
      --y: 50vh;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .scene {
      position: relative;
      width: 100%; height: 100%;
    }

    .layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .layer h1 {
      font-size: clamp(4rem, 15vw, 14rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      text-transform: uppercase;
    }

    .layer-base {
      background: #0a0a0a;
      color: #333;
    }

    .layer-reveal {
      background: #f2f2f2;
      color: #111;
      clip-path: circle(120px at var(--x) var(--y));
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="scene">
    <section class="layer layer-base">
      <h1>PORTFOLIO</h1>
    </section>
    <section class="layer layer-reveal">
      <h1>PORTFOLIO</h1>
    </section>
  </main>

  <p class="hint">Move cursor to reveal</p>

  <script>
    const root = document.documentElement;
    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let currentX = targetX;
    let currentY = targetY;
    const ease = 0.08;

    window.addEventListener("pointermove", (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
    });

    (function animate() {
      currentX += (targetX - currentX) * ease;
      currentY += (targetY - currentY) * ease;
      root.style.setProperty("--x", currentX + "px");
      root.style.setProperty("--y", currentY + "px");
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
